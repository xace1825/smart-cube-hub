version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/smartcube
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartcube
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
